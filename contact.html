<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 720px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2rem);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .row {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.95rem;
      color: #334155;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.98rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .btn {
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .popup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .popup {
      width: min(100%, 420px);
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 22px;
      text-align: center;
    }

    .popup h2 {
      margin-bottom: 8px;
      font-size: 1.25rem;
    }

    .popup p {
      color: #334155;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .close-btn {
      border: none;
      border-radius: 10px;
      background: #e2e8f0;
      color: #0f172a;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 680px) {
      .card {
        border-radius: 16px;
        padding: 20px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Contact Us</h1>
    <p class="subtitle">Send your details and we will get back to you shortly.</p>

    <form id="contactForm">
      <div class="row">
        <div class="field">
          <label for="name">Full Name</label>
          <input id="name" name="name" type="text" placeholder="Enter your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email" required>
        </div>
      </div>

      <div class="field">
        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text" placeholder="Subject" required>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message..." required></textarea>
      </div>

      <button class="btn" type="submit">Submit Application</button>
    </form>
  </main>

  <div class="popup-backdrop" id="popupBackdrop" aria-hidden="true">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <h2 id="popupTitle">Application Status</h2>
      <p>Your application is rejected. As no memeber wanna talk to you</p>
      <button class="close-btn" id="closePopup" type="button">Close</button>
    </div>
  </div>

  <script>
    const form = document.getElementById("contactForm");
    const popupBackdrop = document.getElementById("popupBackdrop");
    const closePopup = document.getElementById("closePopup");

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      popupBackdrop.style.display = "flex";
      popupBackdrop.setAttribute("aria-hidden", "false");
    });

    function hidePopup() {
      popupBackdrop.style.display = "none";
      popupBackdrop.setAttribute("aria-hidden", "true");
    }

    closePopup.addEventListener("click", hidePopup);
    popupBackdrop.addEventListener("click", function (event) {
      if (event.target === popupBackdrop) {
        hidePopup();
      }
    });
  </script>
</body>
</html>
